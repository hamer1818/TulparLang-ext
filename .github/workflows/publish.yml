# Publish the Tulpar VS Code extension to BOTH the official VS Code
# Marketplace and the Open VSX Registry whenever the `version` field
# in package.json changes on main.
#
# Triggers:
#   - push:main with `package.json` in the diff. The "did the version
#     actually change?" check (compares HEAD vs HEAD~1) skips the
#     publish steps when the touch was unrelated (description, deps).
#   - workflow_dispatch: lets the maintainer republish the current
#     main version on demand. Useful for the first run (when secrets
#     aren't set yet, or to recover from a publish that died after one
#     marketplace succeeded but the other didn't).
#
# What the workflow does on a real version bump:
#   1. Build the .vsix (uses `@vscode/vsce package`).
#   2. `vsce publish` → marketplace.visualstudio.com.
#   3. `ovsx publish` → open-vsx.org.
#   4. Tag the commit `vX.Y.Z` and create a GitHub release that
#      attaches the .vsix as a download artifact.
#
# Steps 2 and 3 are independent: if one marketplace rejects the bundle
# (e.g. duplicate version), the workflow surfaces that as a failure
# but the other publish still happens. Re-running the workflow with
# `workflow_dispatch` after a fix is safe — both vsce and ovsx
# idempotently no-op a second publish of an already-published version.
#
# Required repository secrets (Settings → Secrets and variables →
# Actions):
#   - VSCE_PAT  — Azure DevOps PAT, scope "Marketplace: Manage".
#                 https://dev.azure.com/<your-org>/_usersSettings/tokens
#   - OVSX_PAT  — Open VSX token. https://open-vsx.org/user-settings/tokens
#                 (Eclipse Foundation account required.)
#
# Open VSX additionally requires the `hamer1818` namespace to exist
# and you to be a member; create it once via
#   `npx ovsx create-namespace hamer1818 -p $OVSX_PAT`
# or via the open-vsx.org web UI.

name: Publish

on:
  push:
    branches: [main, master]
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force publish even if version is unchanged from HEAD~1 (use after fixing a half-failed publish).'
        type: boolean
        default: false

permissions:
  contents: write

# Two concurrent publish runs would race on the git tag push at the
# end. One-at-a-time per main is enough; the queue is short.
concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need HEAD~1 to compare versions, and full history for
          # `git tag` to work without surprises.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Detect whether package.json's `version` field actually
      # changed in the commit that triggered this run. push:main can
      # fire for many unrelated edits to package.json (description,
      # categories, dependency bumps) — we only want to publish on a
      # real version change.
      - name: Detect version change
        id: ver
        run: |
          set -euo pipefail
          CURRENT="$(node -p "require('./package.json').version")"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.force }}" = "true" ]; then
            echo "Force-publish requested via workflow_dispatch."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # HEAD~1 may not exist (very first commit on branch); guard.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREVIOUS="$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")"
          else
            PREVIOUS=""
          fi
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "Version bump detected: $PREVIOUS → $CURRENT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged ($CURRENT) — nothing to publish."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.ver.outputs.changed == 'true'
        run: npm ci || npm install

      # Build the .vsix once and reuse the same artifact for both
      # marketplaces so they don't accidentally see different bytes.
      - name: Build .vsix
        if: steps.ver.outputs.changed == 'true'
        run: |
          npx --yes @vscode/vsce@latest package \
              --no-dependencies \
              --out "vscode-tulpar-${{ steps.ver.outputs.current }}.vsix"
          ls -la *.vsix

      # `vsce publish` accepts a `.vsix` directly so it doesn't
      # rebuild — same artifact as the .vsix we'll also push to
      # Open VSX and attach to the GitHub release.
      - name: Publish to VS Code Marketplace
        if: steps.ver.outputs.changed == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npx --yes @vscode/vsce@latest publish \
              --packagePath "vscode-tulpar-${{ steps.ver.outputs.current }}.vsix"

      - name: Publish to Open VSX
        if: steps.ver.outputs.changed == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npx --yes ovsx@latest publish \
              "vscode-tulpar-${{ steps.ver.outputs.current }}.vsix"

      # Tag the commit + attach the .vsix to a GitHub Release so users
      # who want to install manually (corp networks that block
      # marketplaces) have a direct download link.
      - name: Tag and create release
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.ver.outputs.current }}"
          # If the tag already exists (workflow_dispatch re-run after
          # fixing one of the two publishes), don't re-tag — just
          # upload the .vsix to the existing release.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; refreshing release asset."
            gh release upload "$TAG" \
                "vscode-tulpar-${{ steps.ver.outputs.current }}.vsix" \
                --clobber
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Tulpar VS Code extension $TAG"
            git push origin "$TAG"
            gh release create "$TAG" \
                "vscode-tulpar-${{ steps.ver.outputs.current }}.vsix" \
                --title "$TAG" \
                --notes "Tulpar VS Code extension $TAG. Auto-published to [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=hamer1818.vscode-tulpar) and [Open VSX](https://open-vsx.org/extension/hamer1818/vscode-tulpar)."
          fi
