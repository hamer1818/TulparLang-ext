# Auto-merge: every non-draft PR is queued for squash-merge as soon as
# the required status checks (ci.yml's `validate` job) turn green.
#
# Mirrors the pattern used in the main TulparLang repo: opening a PR
# is the only manual step; branch protection still blocks the actual
# merge until CI passes, so this is automation, not a gate relaxation.
#
# Why a PAT (AUTOMERGE_PAT) instead of the default GITHUB_TOKEN: when
# a workflow uses GITHUB_TOKEN to merge a PR, the resulting push to
# main is attributed to the token and GitHub deliberately suppresses
# any downstream workflow_run / push events. publish.yml fires on
# push:main with a paths filter on package.json, and would silently
# stop firing on merges if we used GITHUB_TOKEN here. A user-scoped
# fine-grained PAT scoped to this repo (Contents + Pull requests:
# read+write) doesn't trip the recursion guard, so the merge it
# performs DOES trigger publish.yml as expected.

name: Auto-merge

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

# Same enable-auto-merge invocation gets queued on every push to a PR
# (`synchronize`). The first one already set the auto-merge flag —
# subsequent ones are idempotent no-ops, but each one still spawns a
# runner and burns 10-15s. Cancelling in-progress keeps the latest
# enable call's check status visible and frees the queue.
concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    # Skip drafts (still WIP) AND skip PRs from forks. GitHub strips
    # secrets — including AUTOMERGE_PAT — from any workflow triggered
    # by a fork's pull_request, so this job would fail with "no token
    # provided" and litter the Actions log. Fork PRs are reviewed
    # manually by the maintainer; once approved, branch protection
    # auto-fires the merge anyway.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash
